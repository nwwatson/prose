active_membership:
  subscriber: confirmed
  membership_tier: monthly
  stripe_subscription_id: sub_active_test
  stripe_customer_id: cus_active_test
  status: 0
  current_period_start: <%= 15.days.ago %>
  current_period_end: <%= 15.days.from_now %>

canceled_membership:
  subscriber: from_published_post
  membership_tier: annual
  stripe_subscription_id: sub_canceled_test
  stripe_customer_id: cus_canceled_test
  status: 2
  current_period_start: <%= 60.days.ago %>
  current_period_end: <%= 30.days.ago %>
  canceled_at: <%= 30.days.ago %>

past_due_membership:
  subscriber: from_featured_post
  membership_tier: monthly
  stripe_subscription_id: sub_past_due_test
  stripe_customer_id: cus_past_due_test
  status: 1
  current_period_start: <%= 35.days.ago %>
  current_period_end: <%= 5.days.ago %>
